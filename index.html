<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Engineering Roadmap | johnchrisley.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Inter:ital,opsz,wght@0,14..32,300..600;1,14..32,300..400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0c0f;
      --surface: #15181d;
      --surface-2: #1b1f26;
      --surface-3: #101216;
      --border: #2a2f38;
      --text: #aeb4bf;
      --muted: #757d89;
      --faint: #1b1f26;

      --p1: #d7dbe2;
      --p2: #c5cbd6;
      --p3: #b3bac6;
      --p4: #f3f5f7;

      --ok: #34d399;
      --warn: #f59e0b;
      --danger: #ef4444;

      --display: "Syne", sans-serif;
      --mono: "Inter", system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 72% 56% at 72% 14%, rgba(215,219,226,0.12), transparent),
        radial-gradient(ellipse 50% 42% at 18% 86%, rgba(215,219,226,0.06), transparent);
    }

    .shell {
      position: relative;
      z-index: 1;
      width: 90%;
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 16px 92px;
    }

    .hero {
      padding: 34px 0 24px;
      border-bottom: 1px solid var(--border);
    }

    .hero-top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(215, 219, 226, 0.35);
      background: rgba(215, 219, 226, 0.08);
      padding: 7px;
      box-shadow: 0 0 20px rgba(215, 219, 226, 0.16);
    }

    .hero-tag {
      font-size: 11px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }

    .hero-tag b { color: var(--p1); }

    h1 {
      font-family: var(--display);
      font-size: clamp(28px, 6.2vw, 46px);
      text-align: center;
      line-height: 1.08;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    h1 .grad {
      color: var(--p1);
    }

    .hero-sub {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .progress-card {
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(21,24,29,0.92), rgba(16,18,22,0.86));
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .progress-row .pct {
      color: var(--p4);
      font-weight: 700;
      font-size: 13px;
    }

    .progress-track {
      height: 8px;
      border-radius: 99px;
      background: var(--faint);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--p1), var(--p4));
      transition: width 0.35s ease;
    }

    .progress-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    .adhd-toggle-wrap {
      display: flex;
      justify-content: center;
    }

    .adhd-toggle {
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
    }

    .adhd-toggle.on {
      color: var(--warn);
      border-color: rgba(245, 158, 11, 0.45);
      background: rgba(245, 158, 11, 0.1);
    }

    .adhd-banner {
      margin-top: 14px;
      border: 1px solid rgba(245, 158, 11, 0.3);
      background: rgba(245, 158, 11, 0.12);
      border-radius: 12px;
      padding: 10px 12px;
      text-align: center;
      cursor: pointer;
      display: none;
    }

    .adhd-banner.show { display: block; }

    .adhd-banner p { font-size: 13px; color: var(--warn); font-weight: 600; }
    .adhd-banner span { font-size: 10px; color: rgba(245, 158, 11, 0.65); }

    .phase-tabs {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2px;
    }

    .phase-tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex-shrink: 0;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 10px 10px 0 0;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .content {
      padding-top: 18px;
    }

    .phase-card {
      border: 1px solid var(--phase-border);
      background: var(--phase-bg);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 18px;
    }

    .phase-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .phase-title {
      font-family: var(--display);
      color: var(--phase-color);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .phase-period { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .phase-target-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: right;
    }

    .phase-target-value {
      color: var(--phase-color);
      font-size: 13px;
      font-weight: 700;
      text-align: right;
      margin-top: 2px;
    }

    .phase-goal {
      margin-top: 12px;
      border: 1px solid rgba(255,255,255,0.11);
      background: rgba(16, 18, 22, 0.62);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
    }

    .section-label {
      font-family: var(--display);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(220, 230, 240, 0.38);
      margin: 14px 0 10px;
    }

    .skill-card {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .skill-card.open {
      border-color: var(--phase-border-strong);
      background: rgba(255,255,255,0.04);
    }

    .skill-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      cursor: pointer;
      user-select: none;
    }

    .skill-check {
      width: 16px;
      height: 16px;
      accent-color: var(--phase-color);
      cursor: pointer;
      flex-shrink: 0;
    }

    .skill-main {
      flex: 1;
      min-width: 0;
    }

    .skill-main-top {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }

    .skill-name {
      font-family: var(--display);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.25;
    }

    .skill-name.done {
      text-decoration: line-through;
      color: rgba(220, 230, 240, 0.5);
    }

    .pill {
      font-size: 10px;
      letter-spacing: 0.05em;
      font-weight: 700;
      border-radius: 999px;
      padding: 2px 8px;
      border: 1px solid transparent;
    }

    .dots {
      display: flex;
      gap: 3px;
      margin-top: 4px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.14);
    }

    .dot.on { background: var(--warn); }

    .skill-time {
      margin-left: 8px;
      color: var(--muted);
      font-size: 11px;
    }

    .caret {
      color: rgba(255,255,255,0.35);
      font-size: 17px;
      flex-shrink: 0;
    }

    .skill-body {
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 12px;
      display: none;
    }

    .skill-card.open .skill-body { display: block; }

    .mini-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(220,230,240,0.45);
      margin-bottom: 4px;
    }

    .copy {
      font-size: 13px;
      color: rgba(220,230,240,0.8);
      line-height: 1.58;
      margin-bottom: 10px;
    }

    .tip-box {
      border: 1px solid rgba(245,158,11,0.25);
      background: rgba(245,158,11,0.09);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .goal-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .topics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .topic {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: rgba(220,230,240,0.72);
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 11px;
    }

    .resource-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .resource {
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px;
      background: rgba(255,255,255,0.015);
      padding: 8px 10px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .resource.best {
      border-color: var(--phase-border-strong);
      background: rgba(255,255,255,0.05);
    }

    .resource-link {
      color: var(--text);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
    }

    .resource-link:hover { text-decoration: underline; }

    .resource-type {
      font-size: 10px;
      border-radius: 999px;
      padding: 2px 8px;
      font-weight: 700;
      border: 1px solid;
    }

    .milestone-wrap {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255,255,255,0.02);
    }

    .milestone {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
    }

    .milestone:last-child { border-bottom: none; }

    .m-check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.28);
      margin-top: 1px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
    }

    .milestone.done {
      background: var(--phase-dim);
    }

    .milestone.done .m-check {
      border-color: var(--phase-color);
      background: var(--phase-color);
      color: #09101c;
    }

    .milestone-text {
      font-size: 13px;
      color: rgba(220,230,240,0.85);
      line-height: 1.45;
    }

    .milestone.done .milestone-text {
      text-decoration: line-through;
      color: rgba(220,230,240,0.46);
    }

    .checklist-wrap {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255,255,255,0.02);
      margin-bottom: 14px;
    }

    .check-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .check-item:last-child { border-bottom: none; }

    .check-item:hover { background: rgba(255,255,255,0.03); }

    .check-item.done { background: var(--phase-dim); }

    .check-box {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 2px solid rgba(255,255,255,0.3);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
      margin-top: 1px;
    }

    .check-item.done .check-box {
      border-color: var(--phase-color);
      background: var(--phase-color);
      color: #09101c;
    }

    .check-content {
      flex: 1;
      min-width: 0;
    }

    .check-title {
      font-size: 13px;
      color: rgba(220,230,240,0.9);
      line-height: 1.45;
    }

    .check-sub {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.45;
      margin-top: 2px;
    }

    .check-item.done .check-title {
      text-decoration: line-through;
      color: rgba(220,230,240,0.5);
    }

    .extra-box {
      margin-top: 16px;
      border-radius: 12px;
      padding: 12px;
      border: 1px solid;
      background: rgba(255,255,255,0.04);
    }

    .extra-box ol {
      margin-top: 6px;
      padding-left: 18px;
      display: grid;
      gap: 5px;
    }

    .extra-box li,
    .extra-box p {
      color: rgba(220,230,240,0.8);
      font-size: 13px;
      line-height: 1.52;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 4;
      display: flex;
      gap: 6px;
      justify-content: center;
      padding: 10px 10px 14px;
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      background: rgba(11, 12, 15, 0.88);
    }

    .bottom-btn {
      width: min(120px, 24vw);
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      padding: 8px 4px;
      line-height: 1.25;
    }

    @media (max-width: 620px) {
      .hero { padding-top: 24px; }
      .phase-title { font-size: 20px; }
      .phase-target-label,
      .phase-target-value { text-align: left; }
      .bottom-btn { font-size: 9px; }
    }
  </style>
</head>

    function load() {
      try {
        const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        state.checked = raw.checked || {};
        state.adhdMode = !!raw.adhdMode;
        state.tipIdx = Number.isInteger(raw.tipIdx) ? raw.tipIdx : 0;
        state.activePhase = Number.isInteger(raw.activePhase) ? raw.activePhase : 1;
      } catch (_) {
        state.checked = {};
      }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        checked: state.checked,
        adhdMode: state.adhdMode,
        tipIdx: state.tipIdx,
        activePhase: state.activePhase
      }));
    }

    function getPhaseById(id) {
      return PHASES.find((p) => p.id === id) || PHASES[0];
    }

    function getTotals() {
      const totalSkills = PHASES.reduce((n, p) => n + p.skills.length, 0);
      const totalMilestones = PHASES.reduce((n, p) => n + p.milestones.length, 0);
      const totalChecklist = PHASES.reduce((n, p) => n + p.checklist.length, 0);
      const completedCount = Object.values(state.checked).filter(Boolean).length;
      const all = totalSkills + totalMilestones + totalChecklist;
      const pct = all ? Math.round((completedCount / all) * 100) : 0;
      return { totalSkills, totalMilestones, totalChecklist, completedCount, all, pct };
    }

    function keySkill(phaseId, skillId) {
      return `skill-${phaseId}-${skillId}`;
    }

    function keyMilestone(phaseId, index) {
      return `milestone-${phaseId}-${index}`;
    }

    function keyChecklist(phaseId, index) {
      return `checklist-${phaseId}-${index}`;
    }

    function toggleChecked(key) {
      state.checked[key] = !state.checked[key];
      save();
      render();
    }

    function toggleOpen(skillKey) {
      state.openSkills[skillKey] = !state.openSkills[skillKey];
      render();
    }

    function setActivePhase(id) {
      state.activePhase = id;
      save();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderTabs() {
      const tabs = document.getElementById("phaseTabs");
      const bottom = document.getElementById("bottomNav");
      const tabHtml = PHASES.map((p) => {
        const active = p.id === state.activePhase;
        const style = active
          ? `color:${p.color};border-color:${p.border};background:${p.bg};`
          : "";
        return `<button class="tab" data-phase="${p.id}" style="${style}">${p.emoji} ${p.label}</button>`;
      }).join("");
      tabs.innerHTML = tabHtml;

      const bottomHtml = PHASES.map((p) => {
        const active = p.id === state.activePhase;
        const style = active
          ? `color:${p.color};border-color:${p.border};background:${p.bg};`
          : "";
        return `<button class="bottom-btn" data-phase="${p.id}" style="${style}">${p.emoji}<br>${p.label}</button>`;
      }).join("");
      bottom.innerHTML = bottomHtml;

      tabs.querySelectorAll("button").forEach((b) => {
        b.addEventListener("click", () => setActivePhase(Number(b.dataset.phase)));
      });

      bottom.querySelectorAll("button").forEach((b) => {
        b.addEventListener("click", () => setActivePhase(Number(b.dataset.phase)));
      });
    }

    function difficultyDots(level) {
      let html = "<div class=\"dots\">";
      for (let i = 1; i <= 5; i++) {
        html += `<span class=\"dot ${i <= level ? "on" : ""}\"></span>`;
      }
      html += "</div>";
      return html;
    }

    function renderResourceType(type) {
      const color = typeColor[type] || "#a78bfa";
      return `<span class=\"resource-type\" style=\"color:${color};border-color:${color}66;background:${color}22;\">${type}</span>`;
    }

    function renderContent() {
      const phase = getPhaseById(state.activePhase);
      const c = document.getElementById("content");

      const skillsHtml = phase.skills.map((skill) => {
        const checked = !!state.checked[keySkill(phase.id, skill.id)];
        const openKey = `${phase.id}-${skill.id}`;
        const open = !!state.openSkills[openKey];
        const resources = skill.resources.map((r) => {
          return `<div class="resource ${r.best ? "best" : ""}">
            <div>
              ${r.best ? `<span style="font-size:10px;color:${phase.color};margin-right:8px;">★ BEST</span>` : ""}

          </div>`;

        const topics = skill.topics.map((t) => `<span class="topic">${t}</span>`).join("");

        return `<article class="skill-card ${open ? "open" : ""}" style="--phase-border-strong:${phase.border};">

          toggleChecked(cb.dataset.check);
        });
      });

      c.querySelectorAll("[data-toggle-skill]").forEach((el) => {
        el.addEventListener("click", (e) => {
          if (e.target && e.target.matches(".skill-check")) return;
          toggleOpen(el.dataset.toggleSkill);
        });
      });
    }

    function renderProgress() {
      const totals = getTotals();
      const pct = document.getElementById("overallPct");
      const bar = document.getElementById("overallBar");
      const meta = document.getElementById("overallMeta");

      pct.textContent = `${totals.pct}%`;
      bar.style.width = `${totals.pct}%`;
      meta.textContent = `${totals.completedCount} of ${totals.all} items completed`;
    }

    function renderAdhd() {
      const btn = document.getElementById("adhdToggle");
      const banner = document.getElementById("adhdBanner");
      const tip = document.getElementById("adhdTip");
      btn.textContent = `⚡ ADHD Mode ${state.adhdMode ? "ON" : "OFF"}`;
      btn.classList.toggle("on", state.adhdMode);

      if (state.adhdMode) {
        banner.classList.add("show");
        tip.textContent = ADHD_TIPS[state.tipIdx % ADHD_TIPS.length];
      } else {
        banner.classList.remove("show");
      }
    }

    function render() {
      renderProgress();
      renderTabs();
      renderContent();
      renderAdhd();
      bindTopControls();
    }

    function bindTopControls() {
      const adhdToggle = document.getElementById("adhdToggle");
      const adhdBanner = document.getElementById("adhdBanner");

      adhdToggle.onclick = () => {
        state.adhdMode = !state.adhdMode;
        save();
        renderAdhd();
      };

      adhdBanner.onclick = () => {
        if (!state.adhdMode) return;
        state.tipIdx = (state.tipIdx + 1) % ADHD_TIPS.length;
        save();
        renderAdhd();
      };
    }

    load();
    render();
  </script>
  <script src="sync-client.js"></script>
</body>
</html>
